<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>GeoTracker Login</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div class="auth-shell">
    <form class="auth-card" th:action="@{/login}" method="post">
        <h1>GeoTracker</h1>
        <p class="subtitle">Sign in to continue</p>
        <div th:if="${param.error}" class="error">Invalid username or password</div>
        <div th:if="${param.logout}" class="success">You have logged out</div>
        <div th:if="${successMessage}" class="success" th:text="${successMessage}"></div>

        <label>Username</label>
        <input type="text" name="username" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <button type="submit">Login</button>
        <a th:href="@{/registration}">Create account</a>
    </form>
</div>
</body>
</html>
