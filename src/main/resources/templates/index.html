<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>GeoTracker Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>
<div class="dashboard-header">
    <h1>GeoTracker Dashboard</h1>
    <div class="user-pill">Signed in as: <strong sec:authentication="name">user</strong></div>
</div>

<div class="main-container">
    <div th:replace="~{fragments/sidebar :: sidebar(result=${result})}"></div>

    <main class="map-container">
        <div th:if="${successMessage}" class="success-banner" th:text="${successMessage}"></div>
        <div th:if="${infoMessage}" class="info-banner" th:text="${infoMessage}"></div>
        <div th:if="${errorMessage}" class="error-banner" th:text="${errorMessage}"></div>

        <div th:replace="~{fragments/result-card :: resultCard(result=${result})}"></div>
        <div th:replace="~{fragments/map-panel :: mapPanel}"></div>
    </main>
</div>

<script th:inline="javascript">
    const map = L.map('map').setView([48.3794, 31.1656], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    const TRACK_COLORS = ['#E6194B', '#3CB44B', '#0082C8', '#F58231', '#911EB4', '#46F0F0', '#FFE119', '#000075'];
    const getColor = (index) => TRACK_COLORS[index % TRACK_COLORS.length];

    const tracksToDraw = /*[[${result.tracksToDrawOnMap}]]*/ null;
    const drawnFeatures = [];

    if (tracksToDraw && tracksToDraw.length > 0) {
        tracksToDraw.forEach((track, i) => {
            try {
                const coordinates = JSON.parse(track.trackCoordinatesJson);
                if (coordinates.length > 0) {
                    const trackColor = getColor(i);
                    const polyline = L.polyline(coordinates, {
                        color: trackColor,
                        weight: 4,
                        opacity: 0.8
                    }).bindTooltip('<span style="color:' + trackColor + '; font-weight: bold;">' + track.fileName + '</span>', {
                        permanent: true,
                        direction: 'center',
                        className: 'track-label'
                    }).addTo(map);

                    const start = coordinates[0];
                    const finish = coordinates[coordinates.length - 1];

                    L.circleMarker(start, {radius: 6, color: trackColor, fillOpacity: 1})
                        .bindPopup(track.fileName + ' - Start')
                        .addTo(map);
                    L.circleMarker(finish, {radius: 6, color: trackColor, fillColor: '#fff', fillOpacity: 1})
                        .bindPopup(track.fileName + ' - Finish')
                        .addTo(map);

                    drawnFeatures.push(polyline);
                }
            } catch (e) {
                console.error('Failed to parse JSON for track:', track.fileName, e);
            }
        });
    }

    if (drawnFeatures.length > 0) {
        const group = L.featureGroup(drawnFeatures);
        map.fitBounds(group.getBounds().pad(0.1));
    }
</script>
</body>
</html>
